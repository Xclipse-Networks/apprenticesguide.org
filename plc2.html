<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC Logic Studio | apprenticesguide</title>
    <link rel="icon" type="image/x-icon" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --indigo: #6366f1; --bg: #050505; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: #e4e4e7; user-select: none; }
        .glass-card { background: rgba(18, 18, 18, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .rung { border-left: 4px solid #1a1a1a; padding: 30px 20px; position: relative; display: flex; align-items: center; min-height: 100px; transition: 0.3s; }
        .rung::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px; background: #1a1a1a; }
        .line { height: 2px; background: #1a1a1a; flex-grow: 1; transition: 0.3s; }
        .line-active { background: var(--indigo) !important; box-shadow: 0 0 15px var(--indigo); }
        .inst-box { background: #0a0a0a; border: 1px solid #222; padding: 8px; min-width: 70px; text-align: center; border-radius: 6px; position: relative; }
        .inst-box:hover { border-color: var(--indigo); }
        .active-glow { color: var(--indigo); text-shadow: 0 0 10px var(--indigo); }
    </style>
</head>
<body x-data="plcEngine()" class="min-h-screen">

    <nav class="glass-card sticky top-0 z-50 border-b border-white/5 px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-black italic tracking-tighter uppercase">Logic <span class="text-indigo-500">Studio</span></h1>
            <div class="h-6 w-[1px] bg-zinc-800"></div>
            <div class="flex gap-2">
                <template x-for="tool in tools">
                    <button @click="selectedTool = tool.id" 
                            :class="selectedTool === tool.id ? 'bg-indigo-600 text-white' : 'bg-zinc-900 text-zinc-500'"
                            class="px-3 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all">
                        <i :class="tool.icon"></i>
                    </button>
                </template>
            </div>
        </div>

        <div class="flex gap-3">
            <span class="text-[9px] font-black text-zinc-600 uppercase self-center tracking-widest">Presets:</span>
            <button @click="loadPreset('dol')" class="px-4 py-2 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 rounded-lg text-[9px] font-black uppercase hover:bg-indigo-500 hover:text-white transition-all">DOL Starter</button>
            <button @click="loadPreset('latch')" class="px-4 py-2 bg-zinc-900 border border-white/5 text-zinc-400 rounded-lg text-[9px] font-black uppercase hover:bg-zinc-800 transition-all">Latching Relay</button>
            <button @click="rungs = []" class="px-4 py-2 bg-red-950/20 text-red-500 rounded-lg text-[9px] font-black uppercase border border-red-500/20">Clear</button>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-81px)]">
        <aside class="w-64 glass-card border-r border-white/5 p-6 overflow-y-auto">
            <h3 class="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-6">Memory (I/O)</h3>
            <div class="space-y-3">
                <template x-for="(val, key) in tags">
                    <div @click="toggleTag(key)" class="p-3 bg-zinc-950 rounded-xl border border-white/5 cursor-pointer hover:border-indigo-500/30 transition-all">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-mono font-bold" x-text="key"></span>
                            <div :class="val ? 'bg-indigo-500 shadow-[0_0_10px_#6366f1]' : 'bg-zinc-800'" class="w-2 h-2 rounded-full"></div>
                        </div>
                        <span class="text-[9px] text-zinc-600 font-mono uppercase" x-text="typeof val === 'boolean' ? (val ? 'True' : 'False') : val"></span>
                    </div>
                </template>
            </div>
        </aside>

        <main class="flex-grow p-12 bg-[#030303] overflow-y-auto">
            <div class="max-w-4xl mx-auto space-y-6">
                <template x-for="(rung, rIdx) in rungs" :key="rIdx">
                    <div class="rung group">
                        <div class="line" :class="checkContinuity(rIdx) ? 'line-active' : ''"></div>
                        
                        <div class="flex items-center gap-0">
                            <template x-for="(inst, iIdx) in rung.instructions" :key="iIdx">
                                <div class="flex items-center">
                                    <div class="inst-box">
                                        <span class="block text-[8px] font-mono text-zinc-600 mb-1" x-text="inst.tag"></span>
                                        <div :class="evalInst(inst) ? 'active-glow' : 'text-zinc-500'">
                                            <span x-show="inst.type === 'xic'" class="text-xl font-light italic">--| |--</span>
                                            <span x-show="inst.type === 'xio'" class="text-xl font-light italic">--|/|--</span>
                                            <span x-show="inst.type === 'ote'" class="text-xl font-light">--( )--</span>
                                        </div>
                                        <button @click="removeInst(rIdx, iIdx)" class="absolute -top-1 -right-1 hidden group-hover:block text-[8px] bg-red-500 text-white w-3 h-3 rounded-full">×</button>
                                    </div>
                                    <div class="line w-10" :class="evalInst(inst) ? 'line-active' : ''"></div>
                                </div>
                            </template>
                            
                            <button @click="addInstruction(rIdx)" class="w-8 h-8 rounded-full border border-dashed border-zinc-800 text-zinc-700 hover:border-indigo-500 hover:text-indigo-500 transition-all flex items-center justify-center">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>

                        <div class="line" :class="isRungComplete(rIdx) ? 'line-active' : ''"></div>
                    </div>
                </template>
                
                <div x-show="rungs.length === 0" class="h-64 border-2 border-dashed border-zinc-900 rounded-[3rem] flex flex-col items-center justify-center text-zinc-700">
                    <i class="fas fa-project-diagram text-4xl mb-4"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest">Logic Empty. Load a preset or add a rung.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function plcEngine() {
            return {
                selectedTool: 'xic',
                tags: {
                    'START_PB': false,
                    'STOP_PB': true, // Normally Closed field device
                    'MOTOR_CONTACTOR': false,
                    'OVERLOAD_OK': true,
                    'T1_ACC': 0
                },
                rungs: [],
                tools: [
                    { id: 'xic', name: 'NO', icon: 'fas fa-grip-lines-vertical' },
                    { id: 'xio', name: 'NC', icon: 'fas fa-divide' },
                    { id: 'ote', name: 'Coil', icon: 'far fa-circle' }
                ],

                init() {
                    setInterval(() => this.scan(), 50);
                },

                toggleTag(key) {
                    this.tags[key] = !this.tags[key];
                },

                addRung() {
                    this.rungs.push({ instructions: [] });
                },

                addInstruction(rIdx) {
                    const tag = prompt("Assign Tag:", Object.keys(this.tags)[0]);
                    if(tag) this.rungs[rIdx].instructions.push({ type: this.selectedTool, tag: tag });
                },

                removeInst(rIdx, iIdx) {
                    this.rungs[rIdx].instructions.splice(iIdx, 1);
                },

                evalInst(inst) {
                    if (inst.type === 'xic') return this.tags[inst.tag] === true;
                    if (inst.type === 'xio') return this.tags[inst.tag] === false;
                    if (inst.type === 'ote') return this.tags[inst.tag];
                    return false;
                },

                checkContinuity(rIdx) { return true; }, // Power Rail is always hot

                isRungComplete(rIdx) {
                    if (this.rungs[rIdx].instructions.length === 0) return false;
                    return this.rungs[rIdx].instructions.every(i => this.evalInst(i));
                },

                loadPreset(type) {
                    this.rungs = [];
                    if (type === 'dol') {
                        // DOL Preset: (Start OR Seal) AND Stop AND Overload -> Motor
                        this.rungs.push({
                            instructions: [
                                { type: 'xic', tag: 'START_PB' },
                                { type: 'xic', tag: 'STOP_PB' },
                                { type: 'xic', tag: 'OVERLOAD_OK' },
                                { type: 'ote', tag: 'MOTOR_CONTACTOR' }
                            ]
                        });
                        // Add Sealing logic as a separate rung for simplicity in this builder
                        this.rungs.push({
                            instructions: [
                                { type: 'xic', tag: 'MOTOR_CONTACTOR' },
                                { type: 'ote', tag: 'MOTOR_CONTACTOR' }
                            ]
                        });
                    }
                    if (type === 'latch') {
                        this.rungs.push({
                            instructions: [
                                { type: 'xic', tag: 'START_PB' },
                                { type: 'ote', tag: 'MOTOR_CONTACTOR' }
                            ]
                        });
                    }
                },

                scan() {
                    // Actual Output Solving
                    this.rungs.forEach(rung => {
                        const lastInst = rung.instructions[rung.instructions.length - 1];
                        if (lastInst && lastInst.type === 'ote') {
                            const logicResult = rung.instructions.slice(0, -1).every(i => this.evalInst(i));
                            this.tags[lastInst.tag] = logicResult;
                        }
                    });
                }
            }
        }
    </script>

    <footer class="fixed bottom-6 right-8 text-[9px] font-black text-zinc-800 uppercase tracking-[0.4em]">
        © 2026 apprenticesguide
    </footer>
</body>
</html>
