<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLIPSE | ADMIN CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #050505;
            --indigo: #6366f1;
            --red: #ef4444;
            --green: #10b981;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg); 
            color: #e4e4e7; 
            padding: 2rem;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .admin-card {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            max-width: 800px;
            margin: 4rem auto;
            overflow: hidden;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .btn-reinstate {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-reinstate:hover {
            background: var(--green);
            color: #000;
        }

        .nuke-zone {
            background: rgba(239, 68, 68, 0.05);
            padding: 2rem;
            border-top: 2px solid rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="p-8 border-b border-white/5 bg-white/[0.02]">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black italic tracking-tighter uppercase">Admin <span class="text-indigo-500 underline decoration-indigo-500/20">Console</span></h1>
                    <p class="text-[10px] mono text-zinc-500 uppercase tracking-widest mt-1">User Access & Security Management</p>
                </div>
                <div class="text-right">
                    <span class="text-[9px] font-bold text-zinc-600 uppercase block">Local Hardware ID</span>
                    <span class="mono text-[10px] text-indigo-400">XP-0021-SECURE</span>
                </div>
            </div>
        </div>

        <div class="p-4 bg-black/40">
            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-700 px-4 mb-4">Security Registry</h2>
            
            <div id="registry-list">
                </div>
        </div>

        <div class="nuke-zone">
            <h3 class="text-sm font-bold text-red-500 uppercase mb-2">Emergency Override</h3>
            <p class="text-xs text-zinc-500 mb-6">Wiping the local database will clear all progress, blockages, and declarations across all units. This action cannot be undone.</p>
            <button onclick="nukeStorage()" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-8 rounded-xl text-[10px] uppercase tracking-widest transition">
                Nuke Local Database
            </button>
        </div>
    </div>

    <script>
        const registryList = document.getElementById('registry-list');

        function loadRegistry() {
            registryList.innerHTML = ''; // Clear current view
            
            // List of keys to check
            const keys = [
                { id: 'ueeel0019_blocked', label: 'UEEEL0019 Block Status' },
                { id: 'ueeel0019_agreed', label: 'UEEEL0019 Agreement' },
                { id: 'ueeel0021_agreed', label: 'UEEEL0021 Agreement' }
            ];

            keys.forEach(key => {
                const val = localStorage.getItem(key.id);
                const isActive = val === 'true';
                
                const row = document.createElement('div');
                row.className = 'status-row';
                row.innerHTML = `
                    <div>
                        <span class="text-xs font-bold text-zinc-300">${key.label}</span>
                        <span class="block text-[9px] mono uppercase ${isActive ? 'text-indigo-500' : 'text-zinc-700'}">
                            Current Value: ${val || 'Null'}
                        </span>
                    </div>
                    ${isActive ? `<button onclick="reinstate('${key.id}')" class="btn-reinstate">Clear Flag</button>` : '<span class="text-[9px] font-black uppercase text-zinc-800 tracking-tighter">Inactive</span>'}
                `;
                registryList.appendChild(row);
            });
        }

        function reinstate(keyId) {
            if(confirm(`Are you sure you want to reinstate access for ${keyId}?`)) {
                localStorage.removeItem(keyId);
                loadRegistry();
                alert('Access successfully reinstated.');
            }
        }

        function nukeStorage() {
            if(confirm("CRITICAL: This will delete ALL user data and site settings locally. Proceed?")) {
                localStorage.clear();
                loadRegistry();
                alert('Database Purged.');
            }
        }

        // Initial Load
        loadRegistry();
    </script>
</body>
</html>
